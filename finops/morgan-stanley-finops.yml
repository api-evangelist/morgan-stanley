specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Morgan Stanley
providerId: morgan-stanley
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Financial
  - Investment Banking
  - Wealth Management
description: 'FOCUS-aligned FinOps profile for Morgan Stanley APIs: an institutional, invitation-only
  platform whose costs are bundled into the underlying client services agreement (advisory, brokerage,
  custody, equity comp). There is no public per-call price; consumption is governed by entitlement and
  scheme fees rather than developer-platform metering.'
sources:
  - https://developer.morganstanley.com/
  - https://developer.morganstanley.com/terms
notes: No public usage / billing API. Reconciliation set to false; meters are modeled against expected
  invoice line items.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Morgan Stanley & Co. LLC
serviceCategory: Financial Services
billingModel:
  pricingCategory: Bundled with Client Agreement
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Tax
focusColumns:
  ServiceName: Morgan Stanley API
  ServiceCategory: Financial Services
  ProviderName: Morgan Stanley
  PublisherName: Morgan Stanley & Co. LLC
  InvoiceIssuerName: Morgan Stanley & Co. LLC
  BillingCurrency: USD
meters:
  - name: advisory_fees
    unit: month
    aggregation: sum
    dimensions:
      - account
      - product
  - name: trade_execution
    unit: trade
    aggregation: count
    dimensions:
      - account
      - asset_class
      - venue
  - name: market_data_entitlements
    unit: month
    aggregation: sum
    dimensions:
      - exchange
      - feed
  - name: equity_comp_seats
    unit: seat
    aggregation: max
    dimensions:
      - employer
principles:
  - name: Visibility
    description: Reconcile Morgan Stanley client statements (custody, advisory, equity comp) against expected
      activity; the developer platform surfaces functional usage but not direct cost.
  - name: Allocation
    description: Allocate by client account / employer plan and underlying product (Wealth Management,
      Institutional Securities, Morgan Stanley at Work).
  - name: Optimization
    description: Optimization happens at the relationship level (advisory tier, execution venue, market-data
      entitlement scope) rather than at the API call.
  - name: Accountability
    description: The client relationship owner is the budget owner; the integration team monitors API
      call patterns to ensure they stay within the contracted entitlement.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
