specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Morgan Stanley
providerId: morgan-stanley
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Financial
  - Investment Banking
  - Wealth Management
description: Morgan Stanley does not publish public rate limits for its institutional API platform. Limits
  are documented inside the gated developer portal and governed by the per-client / per-partner agreement.
  Market-data endpoints inherit the limits of upstream exchange entitlements.
sources:
  - https://developer.morganstanley.com/
  - https://developer.morganstanley.com/terms
notes: Public rate-limit specifics not reachable without onboarded credentials; reconciled set to false.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-client throughput (institutional)
    scope: account
    metric: varies
    limit: see developer.morganstanley.com (gated)
    notes: Limits documented inside the authenticated developer portal and tuned per client onboarding.
  - name: Market-data entitlement throttle
    scope: account/exchange
    metric: varies
    limit: per upstream exchange entitlement
    notes: Real-time market data is constrained by the exchange's redistribution entitlement, not by Morgan
      Stanley alone.
policies:
  - name: Onboarding-driven sizing
    description: Throughput is sized during institutional onboarding and recorded in the client services
      addendum; raise via the client service representative.
  - name: Idempotency and retries
    description: Trade-execution calls should be idempotent and retried with backoff; consult the gated
      developer portal for endpoint-specific guidance.
  - name: Entitlement separation
    description: Market-data, portfolio, and trade-execution endpoints carry independent entitlements
      and may throttle separately.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
